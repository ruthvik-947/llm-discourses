<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Discourses</title>
    <style>
      :root {
        --bg: #f4efe6;
        --bg-sunk: #ebe4d6;
        --ink: #1f1b17;
        --ink-soft: #4a433b;
        --ink-muted: #7a7267;
        --rule: #c9bfa8;
        --accent-a: #7a2e1f;
        --accent-b: #2f4a3a;
        --accent-a-tint: color-mix(in oklch, var(--accent-a) 4%, transparent);
        --accent-b-tint: color-mix(in oklch, var(--accent-b) 4%, transparent);
        --focus: #d4a73a;

        --font-display: ui-serif, "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
        --font-body: Charter, "Bitstream Charter", "Sitka Text", Cambria, Georgia, serif;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font-body);
        font-size: 17px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: clamp(24px, 5vw, 56px) 20px 80px;
      }

      h1 {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: clamp(1.9rem, 3.2vw, 2.4rem);
        letter-spacing: -0.01em;
        margin: 0 0 4px;
      }

      .sub {
        color: var(--ink-soft);
        margin: 0 0 32px;
        font-style: italic;
      }

      .kickoff { margin-bottom: 16px; }

      .kickoff label,
      .field label {
        display: block;
        font-family: var(--font-display);
        font-size: 0.92rem;
        color: var(--ink-soft);
        margin-bottom: 6px;
      }

      textarea,
      input,
      select {
        width: 100%;
        padding: 12px 14px;
        background: var(--bg-sunk);
        border: 1px solid var(--rule);
        border-radius: 3px;
        color: var(--ink);
        font-family: var(--font-body);
        font-size: 1rem;
      }

      textarea#kickoff {
        min-height: 130px;
        resize: vertical;
        line-height: 1.5;
      }

      input,
      select {
        padding: 9px 12px;
        font-size: 0.95rem;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: 2px solid var(--focus);
        outline-offset: 1px;
        border-color: transparent;
      }

      .actions {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-top: 4px;
      }

      .btn-primary {
        font-family: var(--font-display);
        font-size: 0.98rem;
        padding: 10px 22px;
        background: var(--ink);
        color: var(--bg);
        border: 1px solid var(--ink);
        border-radius: 3px;
        cursor: pointer;
        letter-spacing: 0.01em;
        transition: background 140ms ease, border-color 140ms ease;
      }

      .btn-primary:hover:not(:disabled) {
        background: var(--accent-a);
        border-color: var(--accent-a);
      }

      .btn-primary:disabled {
        opacity: 0.45;
        cursor: default;
      }

      .btn-ghost {
        font-family: var(--font-body);
        font-size: 0.87rem;
        padding: 6px 14px;
        background: transparent;
        color: var(--ink-soft);
        border: 1px solid var(--rule);
        border-radius: 3px;
        cursor: pointer;
      }

      .btn-ghost:hover {
        color: var(--ink);
        border-color: var(--ink-soft);
      }

      .status {
        color: var(--ink-muted);
        font-size: 0.9rem;
        min-height: 1.5em;
        font-style: italic;
        margin: 10px 0 0;
      }

      details.config {
        margin: 28px 0;
        border-top: 1px solid var(--rule);
        border-bottom: 1px solid var(--rule);
      }

      details.config > summary {
        list-style: none;
        cursor: pointer;
        padding: 14px 0;
        font-family: var(--font-display);
        font-size: 0.95rem;
        color: var(--ink-soft);
        display: flex;
        align-items: baseline;
        gap: 14px;
      }

      details.config > summary::-webkit-details-marker { display: none; }

      details.config > summary::before {
        content: "▸";
        font-size: 0.75rem;
        color: var(--ink-muted);
        transition: transform 140ms ease;
        flex-shrink: 0;
      }

      details.config[open] > summary::before { transform: rotate(90deg); }

      .summary-label { flex-shrink: 0; }

      .summary-preview {
        color: var(--ink-muted);
        font-style: italic;
        font-size: 0.88rem;
        text-align: right;
        margin-left: auto;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .config-body {
        display: grid;
        grid-template-columns: 1fr;
        gap: 28px;
        padding: 4px 0 24px;
      }

      @media (min-width: 680px) {
        .config-body {
          grid-template-columns: 1fr 1fr;
          gap: 36px;
        }
      }

      .config-col h2 {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 0.78rem;
        margin: 0 0 14px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      .speaker-a-label { color: var(--accent-a); }
      .speaker-b-label { color: var(--accent-b); }

      .field { margin-bottom: 14px; }

      .field label {
        font-family: var(--font-body);
        font-size: 0.85rem;
      }

      .hint {
        display: block;
        font-size: 0.8rem;
        color: var(--ink-muted);
        margin-top: 5px;
        font-style: italic;
        line-height: 1.4;
      }

      .transcript { margin-top: 36px; }

      .turn {
        padding: 16px 0 18px 22px;
        margin-bottom: 10px;
        border-left: 2px solid var(--rule);
        animation: fade 220ms ease-out;
      }

      .turn.speaker-a {
        border-left-color: var(--accent-a);
        background: var(--accent-a-tint);
      }

      .turn.speaker-b {
        border-left-color: var(--accent-b);
        background: var(--accent-b-tint);
      }

      .turn-meta {
        font-size: 0.82rem;
        color: var(--ink-muted);
        margin-bottom: 10px;
        letter-spacing: 0.01em;
      }

      .turn-meta .model {
        font-weight: 600;
        color: var(--ink);
      }

      .turn.speaker-a .turn-meta .model { color: var(--accent-a); }
      .turn.speaker-b .turn-meta .model { color: var(--accent-b); }

      .turn-body {
        white-space: pre-wrap;
        word-wrap: break-word;
        line-height: 1.6;
      }

      @keyframes fade {
        from { opacity: 0; transform: translateY(3px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .empty-state {
        padding: 8px 0 0;
        color: var(--ink-muted);
        font-style: italic;
        line-height: 1.6;
        max-width: 56ch;
      }

      .session-footer {
        margin-top: 44px;
        padding-top: 18px;
        border-top: 1px solid var(--rule);
        display: flex;
        flex-wrap: wrap;
        gap: 10px 18px;
        align-items: center;
        font-size: 0.88rem;
        color: var(--ink-muted);
      }

      .session-footer strong {
        color: var(--ink);
        font-weight: 600;
      }

      .session-footer .spacer { flex: 1; }

      .session-footer .sep { color: var(--rule); }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>LLM Discourses</h1>
      <p class="sub">Two models, one kickoff prompt. Watch them talk.</p>

      <div class="kickoff">
        <label for="kickoff">Kickoff prompt</label>
        <textarea id="kickoff" placeholder="Something you'd genuinely want a second opinion on — a claim to stress-test, a design tradeoff, a passage to critique."></textarea>
      </div>

      <div class="actions">
        <button id="runBtn" class="btn-primary">Start conversation</button>
      </div>
      <p class="status" id="status"></p>

      <details class="config" id="config" open>
        <summary>
          <span class="summary-label">Models &amp; keys</span>
          <span class="summary-preview" id="configPreview"></span>
        </summary>
        <div class="config-body">
          <div class="config-col">
            <h2 class="speaker-a-label">Speaker A</h2>
            <div class="field">
              <label for="provider1">Provider</label>
              <select id="provider1">
                <option value="chatgpt">ChatGPT</option>
                <option value="claude">Claude</option>
              </select>
            </div>
            <div class="field">
              <label for="model1">Model</label>
              <input id="model1" value="gpt-4.1" />
            </div>
            <div class="field">
              <label for="key1">API key</label>
              <input id="key1" type="password" placeholder="sk-..." />
              <span class="hint" id="trust1"></span>
            </div>
            <div class="field">
              <label for="turns1">Max turns</label>
              <input id="turns1" type="number" min="0" max="20" value="3" />
              <span class="hint">Capped at 20 to keep costs predictable.</span>
            </div>
          </div>

          <div class="config-col">
            <h2 class="speaker-b-label">Speaker B</h2>
            <div class="field">
              <label for="provider2">Provider</label>
              <select id="provider2">
                <option value="claude">Claude</option>
                <option value="chatgpt">ChatGPT</option>
              </select>
            </div>
            <div class="field">
              <label for="model2">Model</label>
              <input id="model2" value="claude-sonnet-4-5" />
            </div>
            <div class="field">
              <label for="key2">API key</label>
              <input id="key2" type="password" placeholder="sk-ant-..." />
              <span class="hint" id="trust2"></span>
            </div>
            <div class="field">
              <label for="turns2">Max turns</label>
              <input id="turns2" type="number" min="0" max="20" value="3" />
              <span class="hint">Capped at 20 to keep costs predictable.</span>
            </div>
          </div>
        </div>
      </details>

      <section class="transcript" id="transcript" aria-live="polite">
        <p class="empty-state" id="emptyState">Up to twenty turns. The transcript appears here as they reply.</p>
      </section>

      <section id="sessionSummary"></section>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const statusEl = $("status");
      const transcriptEl = $("transcript");
      const sessionSummaryEl = $("sessionSummary");
      const runBtn = $("runBtn");
      const configPreview = $("configPreview");

      let sessionTurns = [];
      let lastSessionMeta = null;
      let totalMaxTurns = 0;

      const PROVIDER_DISPLAY = { chatgpt: "OpenAI", claude: "Anthropic" };
      const providerName = (v) => PROVIDER_DISPLAY[v] || "your chosen provider";

      function updateTrustLine(hintEl, providerEl) {
        hintEl.textContent = `Stored in this browser only. Sent directly to ${providerName(providerEl.value)}, never to us.`;
      }

      function updateConfigPreview() {
        const m1 = $("model1").value.trim() || "Speaker A";
        const m2 = $("model2").value.trim() || "Speaker B";
        const t1 = Number($("turns1").value) || 0;
        const t2 = Number($("turns2").value) || 0;
        const turns = t1 === t2 ? `${t1} turns each` : `${t1} + ${t2} turns`;
        configPreview.textContent = `${m1} vs. ${m2} · ${turns}`;
      }

      function clampTurns(input) {
        const n = Number(input.value);
        if (!Number.isFinite(n)) return;
        if (n > 20) input.value = 20;
        if (n < 0) input.value = 0;
      }

      ["provider1", "provider2", "model1", "model2", "turns1", "turns2"].forEach((id) => {
        $(id).addEventListener("input", updateConfigPreview);
      });
      $("turns1").addEventListener("change", (e) => { clampTurns(e.target); updateConfigPreview(); });
      $("turns2").addEventListener("change", (e) => { clampTurns(e.target); updateConfigPreview(); });
      $("provider1").addEventListener("change", () => updateTrustLine($("trust1"), $("provider1")));
      $("provider2").addEventListener("change", () => updateTrustLine($("trust2"), $("provider2")));

      updateTrustLine($("trust1"), $("provider1"));
      updateTrustLine($("trust2"), $("provider2"));
      updateConfigPreview();

      runBtn.addEventListener("click", async () => {
        const body = {
          kickoffPrompt: $("kickoff").value,
          llm1: {
            provider: $("provider1").value,
            model: $("model1").value.trim(),
            apiKey: $("key1").value.trim(),
            maxTurns: Number($("turns1").value)
          },
          llm2: {
            provider: $("provider2").value,
            model: $("model2").value.trim(),
            apiKey: $("key2").value.trim(),
            maxTurns: Number($("turns2").value)
          }
        };

        totalMaxTurns = body.llm1.maxTurns + body.llm2.maxTurns;

        runBtn.disabled = true;
        transcriptEl.innerHTML = "";
        sessionSummaryEl.innerHTML = "";
        sessionSummaryEl.className = "";
        sessionTurns = [];
        lastSessionMeta = null;
        setStatus(`Waiting on ${body.llm1.model || "Speaker A"}...`);

        try {
          await streamConversation(body);
        } catch (error) {
          setStatus(error.message || "Unexpected error.");
        } finally {
          runBtn.disabled = false;
        }
      });

      function setStatus(text) { statusEl.textContent = text; }

      async function streamConversation(body) {
        const response = await fetch("/api/run/stream", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(body)
        });

        if (!response.ok) {
          const data = await response.json().catch(() => null);
          throw new Error(data?.error || "Request failed.");
        }

        if (!response.body) {
          throw new Error("Streaming is not supported in this browser.");
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let turnCount = 0;

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop() || "";

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed) continue;
            const event = JSON.parse(trimmed);

            if (event.type === "turn") {
              turnCount += 1;
              sessionTurns.push(event.turn);
              appendTurn(event.turn, turnCount);
              const nextModel = event.turn.speaker === "LLM 1" ? body.llm2.model : body.llm1.model;
              setStatus(`Streamed turn ${turnCount} of ${totalMaxTurns}. Waiting on ${nextModel || "the next speaker"}...`);
            } else if (event.type === "done") {
              lastSessionMeta = {
                turnsUsed: event.turnsUsed,
                usageTotals: event.usageTotals,
                cost: event.cost,
                kickoffPrompt: body.kickoffPrompt,
                llm1: body.llm1,
                llm2: body.llm2
              };
              renderSessionSummary(event);
              setStatus(`Finished after ${turnCount} turns. ${event.turnsUsed.llm1} from ${body.llm1.model}, ${event.turnsUsed.llm2} from ${body.llm2.model}.`);
            } else if (event.type === "error") {
              throw new Error(event.error || "Run failed.");
            }
          }
        }

        if (turnCount === 0) {
          transcriptEl.innerHTML = '<p class="empty-state">No turns were generated.</p>';
        }
      }

      function appendTurn(turn, index) {
        const empty = $("emptyState");
        if (empty) empty.remove();

        const article = document.createElement("article");
        const isA = turn.speaker === "LLM 1";
        article.className = `turn ${isA ? "speaker-a" : "speaker-b"}`;

        const meta = document.createElement("div");
        meta.className = "turn-meta";
        const modelSpan = document.createElement("span");
        modelSpan.className = "model";
        modelSpan.textContent = turn.model || turn.speaker;
        meta.append(modelSpan);
        meta.append(document.createTextNode(` · ${turn.provider} · turn ${index} of ${totalMaxTurns}`));

        const bodyEl = document.createElement("div");
        bodyEl.className = "turn-body";
        bodyEl.textContent = turn.text || "";

        article.append(meta, bodyEl);
        transcriptEl.appendChild(article);
      }

      function renderSessionSummary(event) {
        const hasNumericCost = typeof event?.cost?.totalUsd === "number";
        const costText = hasNumericCost ? formatUsd(event.cost.totalUsd) : "n/a";
        const partial = event?.cost?.complete ? "" : " (partial)";
        const usage = event?.usageTotals || {};
        const total = usage.totalTokens || 0;

        sessionSummaryEl.className = "session-footer";
        sessionSummaryEl.innerHTML = `
          <span><strong>${total.toLocaleString()}</strong> tokens</span>
          <span class="sep">·</span>
          <span>cost <strong>${costText}</strong>${partial}</span>
          <span class="spacer"></span>
          <button id="downloadMdBtn" class="btn-ghost" type="button">Download transcript</button>
        `;

        $("downloadMdBtn").addEventListener("click", downloadTranscriptMarkdown);
      }

      function formatUsd(value) {
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: "USD",
          minimumFractionDigits: 4,
          maximumFractionDigits: 4
        }).format(value);
      }

      function downloadTranscriptMarkdown() {
        if (!sessionTurns.length || !lastSessionMeta) {
          setStatus("No transcript available to download yet.");
          return;
        }

        const markdown = buildTranscriptMarkdown();
        const blob = new Blob([markdown], { type: "text/markdown;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const stamp = new Date().toISOString().replace(/[:.]/g, "-");
        const a = document.createElement("a");
        a.href = url;
        a.download = `llm-discourse-${stamp}.md`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function buildTranscriptMarkdown() {
        const lines = [];
        const kickoff = (lastSessionMeta.kickoffPrompt || "").trim();
        const turnsUsed = lastSessionMeta.turnsUsed || {};
        const usage = lastSessionMeta.usageTotals || {};
        const cost = lastSessionMeta.cost || {};
        const llm1 = lastSessionMeta.llm1 || {};
        const llm2 = lastSessionMeta.llm2 || {};
        const generatedAt = new Date().toISOString();

        lines.push("# LLM Discourses Transcript");
        lines.push("");
        lines.push(`- Generated: ${generatedAt}`);
        lines.push(`- ${llm1.model}: ${turnsUsed.llm1 || 0} turns`);
        lines.push(`- ${llm2.model}: ${turnsUsed.llm2 || 0} turns`);
        lines.push(
          `- Tokens: ${usage.totalTokens || 0} total (${usage.inputTokens || 0} input / ${usage.outputTokens || 0} output)`
        );

        if (typeof cost.totalUsd === "number") {
          lines.push(
            `- Cost: ${formatUsd(cost.totalUsd)}${cost.complete ? "" : " (partial, some model pricing unknown)"}`
          );
        }

        if (kickoff) {
          lines.push("");
          lines.push("## Kickoff");
          lines.push("");
          lines.push(kickoff);
        }

        lines.push("");
        lines.push("## Conversation");
        lines.push("");

        sessionTurns.forEach((turn, index) => {
          lines.push(`### ${turn.model} — turn ${index + 1}`);
          lines.push(`*${turn.provider}*`);
          lines.push("");
          lines.push((turn.text || "").trim());
          lines.push("");
        });

        return lines.join("\n").trimEnd() + "\n";
      }
    </script>
  </body>
</html>
